[tox]
envlist = py310,py311,py312,py313,py314,pypy3
minversion = 4.2

[testenv]
usedevelop = True
extras =
  test
  twisted
commands =
  python -W once -m testtools.run tests.test_suite {posargs}

[testenv:ruff]
deps =
  pre-commit
commands =
  pre-commit run -a

[testenv:mypy]
deps =
  mypy>=1.20.0
commands =
  mypy --cache-dir="{envdir}/mypy_cache" {posargs:testtools}
